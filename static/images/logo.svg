<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 72" width="210" height="72">
  <defs>
    <linearGradient id="gGold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f2d978"/>
      <stop offset="50%" stop-color="#C6A042"/>
      <stop offset="100%" stop-color="#7e5e1a"/>
    </linearGradient>
    <linearGradient id="gShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#282420"/>
      <stop offset="100%" stop-color="#100e08"/>
    </linearGradient>
    <linearGradient id="gBanner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a6c18"/>
      <stop offset="50%" stop-color="#C6A042"/>
      <stop offset="100%" stop-color="#8a6c18"/>
    </linearGradient>
  </defs>

  <!-- ===== LEFT LAUREL BRANCH ===== -->
  <path d="M 18,18 Q 14,36 13,56" stroke="#C6A042" stroke-width="1.2" fill="none"/>
  <ellipse cx="13" cy="23" rx="5" ry="2"   transform="rotate(-55 13 23)"   fill="#C6A042"/>
  <ellipse cx="11" cy="30" rx="5" ry="2"   transform="rotate(-43 11 30)"   fill="#C6A042"/>
  <ellipse cx="10" cy="38" rx="5" ry="2"   transform="rotate(-30 10 38)"   fill="#C6A042"/>
  <ellipse cx="11" cy="46" rx="5" ry="2"   transform="rotate(-18 11 46)"   fill="#C6A042"/>
  <ellipse cx="13" cy="53" rx="5" ry="2"   transform="rotate(-6  13 53)"   fill="#C6A042"/>

  <!-- ===== RIGHT LAUREL BRANCH (mirror) ===== -->
  <path d="M 62,18 Q 66,36 67,56" stroke="#C6A042" stroke-width="1.2" fill="none"/>
  <ellipse cx="67" cy="23" rx="5" ry="2"   transform="rotate(55  67 23)"   fill="#C6A042"/>
  <ellipse cx="69" cy="30" rx="5" ry="2"   transform="rotate(43  69 30)"   fill="#C6A042"/>
  <ellipse cx="70" cy="38" rx="5" ry="2"   transform="rotate(30  70 38)"   fill="#C6A042"/>
  <ellipse cx="69" cy="46" rx="5" ry="2"   transform="rotate(18  69 46)"   fill="#C6A042"/>
  <ellipse cx="67" cy="53" rx="5" ry="2"   transform="rotate(6   67 53)"   fill="#C6A042"/>

  <!-- ===== SHIELD OUTER (GOLD) ===== -->
  <path d="M 19,2 L 61,2 L 63,38 Q 61,60 40,70 Q 19,60 17,38 Z" fill="url(#gGold)"/>

  <!-- ===== SHIELD INNER (DARK) ===== -->
  <path d="M 23,6 L 57,6 L 59,38 Q 57,56 40,66 Q 23,56 21,38 Z" fill="url(#gShield)"/>

  <!-- ===== BUILDINGS / SKYLINE ===== -->
  <rect x="28" y="17" width="6" height="13" rx="0.5" fill="url(#gGold)"/>
  <rect x="35" y="12" width="7" height="18" rx="0.5" fill="url(#gGold)"/>
  <polygon points="38.5,9 41.5,9 40.5,12 37.5,12"              fill="url(#gGold)"/>
  <rect x="43" y="17" width="6" height="13" rx="0.5" fill="url(#gGold)"/>
  <path d="M 28,30 Q 40,22 49,30" fill="none" stroke="url(#gGold)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ===== ST MONOGRAM ===== -->
  <text x="40" y="51"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" font-weight="bold"
        fill="url(#gGold)" letter-spacing="3">ST</text>

  <!-- ===== BOTTOM BANNER ===== -->
  <rect x="17" y="55" width="46" height="11" rx="1" fill="url(#gBanner)"/>
  <text x="40" y="63.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="5.5" font-weight="700"
        fill="#111111" letter-spacing="1">SARIGÜL TİCARET</text>

  <!-- ===== COMPANY NAME (right side) ===== -->
  <text x="147" y="38"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="22" font-weight="900"
        fill="#ffffff" letter-spacing="0.5">SARIGÜL</text>

  <!-- ===== — TİCARET — with decorative lines ===== -->
  <line x1="88"  y1="50" x2="108" y2="50" stroke="#C6A042" stroke-width="1.8"/>
  <text x="147" y="54"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" font-weight="700"
        fill="#C6A042" letter-spacing="3.5">TİCARET</text>
  <line x1="186" y1="50" x2="206" y2="50" stroke="#C6A042" stroke-width="1.8"/>
</svg>
