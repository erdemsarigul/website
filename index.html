<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarıgül Ticaret</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #f1c40f; }
        .logo { font-size: 24px; font-weight: bold; color: #f1c40f; text-decoration: none; }
        .products-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; }
        .product-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; width: 280px; }
        .product-card img { width: 100%; border-radius: 8px; cursor: pointer; }
        
        /* MODAL PENCERESİ */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #fff; color: #000; margin: 15% auto; padding: 30px; border-radius: 15px; width: 80%; max-width: 400px; position: relative; }
        .close { position: absolute; right: 15px; top: 5px; font-size: 30px; cursor: pointer; }
        #modalDetay { text-align: left; background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 15px; white-space: pre-line; }
        .ws-btn { display: block; background: #25d366; color: #fff; padding: 12px; margin-top: 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SARIGÜL TİCARET</a>
</header>

<div class="products-grid">
    <div class="product-card">
        <img src="images/IMG-20260308-WA0001.jpg" onclick="bilgiAc('Kapsül Şemsiye', '• Su geçirmez nano kumaş\n• Ultra hafif mini boy\n• Şık taşıma kılıfı')">
        <h3>Kapsül Şemsiye</h3>
    </div>
    <div class="product-card">
        <img src="images/IMG-20260308-WA0004.jpg" onclick="bilgiAc('45W Araç Şarjı', '• Süper hızlı şarj desteği\n• Type-C + USB çıkış\n• Akıllı koruma sistemi')">
        <h3>45W Araç Şarjı</h3>
    </div>
</div>

<footer style="padding: 20px; color: #777; font-size: 13px;">
    Çorlu Silahtarağa Mah. Adil Sok. No:4 | +90 542 744 75 50
</footer>

<div id="urunModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="bilgiKapat()">&times;</span>
        <h2 id="modalBaslik">Ürün Bilgisi</h2>
        <div id="modalDetay"></div>
        <a href="https://wa.me/905427447550" class="ws-btn">WhatsApp'tan Sipariş Ver</a>
    </div>
</div>

<script>
    function bilgiAc(ad, detay) {
        document.getElementById('modalBaslik').innerText = ad;
        document.getElementById('modalDetay').innerText = detay;
        document.getElementById('urunModal').style.display = 'block';
    }
    function bilgiKapat() {
        document.getElementById('urunModal').style.display = 'none';
    }
    window.onclick = function(e) { if (e.target.id == 'urunModal') bilgiKapat(); }
</script>

</body>
</html>
