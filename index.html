<script>
    // Pencereyi Açan Fonksiyon
    function bilgiAc(baslik, aciklama) {
        const modal = document.getElementById('urunModal');
        const mBaslik = document.getElementById('modalBaslik');
        const mDetay = document.getElementById('modalDetay');

        mBaslik.innerText = baslik;
        mDetay.innerText = aciklama;
        
        modal.style.display = "block";
        document.body.style.overflow = 'hidden'; // Sayfa arkada kaymasın
    }

    // Pencereyi Kapatan Fonksiyon
    function bilgiKapat() {
        const modal = document.getElementById('urunModal');
        modal.style.display = "none";
        document.body.style.overflow = 'auto'; // Kaymayı geri aç
    }

    // Pencere dışına (siyah alana) tıklandığında kapatma
    window.onclick = function(event) {
        const modal = document.getElementById('urunModal');
        if (event.target == modal) {
            bilgiKapat();
        }
    }

    // ESC tuşuna basınca kapatma özelliği
    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            bilgiKapat();
        }
    });
</script>
