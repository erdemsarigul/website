<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sarıgül Ticaret – Telefon Aksesuar & Elektronik</title>
<link rel="stylesheet" href="css/style.css" />

<style>
    /* Pop-up (Modal) Tasarımı */
    .modal {
        display: none; 
        position: fixed; 
        z-index: 9999; 
        left: 0; top: 0; width: 100%; height: 100%; 
        background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
        background-color: #fff;
        margin: 10% auto;
        padding: 20px;
        border-radius: 12px;
        width: 80%;
        max-width: 500px;
        text-align: center;
        position: relative;
    }
    .close {
        position: absolute;
        right: 15px;
        top: 10px;
        font-size: 28px;
        cursor: pointer;
    }
    .product-card img {
        cursor: pointer;
        transition: transform 0.3s;
    }
    .product-card img:hover {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<header>
    <div class="container">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Sarıgül Ticaret" width="150">
        </a>
    </div>
</header>

<section class="featured-products">
    <div class="container">
        <h2 class="section-title">Öne Çıkan Ürünler</h2>
        <div class="products-grid">

            <div class="product-card">
                <div class="product-image">
                    <img src="images/IMG-20260308-WA0001.jpg" alt="Kapsül Şemsiye" onclick="bilgiAc('Kapsül Şemsiye', 'Özel su geçirmez kumaş, 5 farklı renk seçeneği, ultra hafif yapı.')">
                </div>
                <div class="product-info">
                    <h3>Kapsül Şemsiye</h3>
                    <p>Detay için fotoğrafa tıkla</p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images/IMG-20260308-WA0004.jpg" alt="Araç Şarjı" onclick="bilgiAc('45W Araç Şarjı', '45W Hızlı Şarj, PD ve USB-A çıkışlı, alüminyum gövde.')">
                </div>
                <div class="product-info">
                    <h3>Noise 45W PD Şarj</h3>
                    <p>Detay için fotoğrafa tıkla</p>
                </div>
            </div>

        </div>
    </div>
</section>

<div id="urunModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="bilgiKapat()">&times;</span>
        <h2 id="modalBaslik">Ürün Adı</h2>
        <hr>
        <p id="modalDetay" style="padding: 20px; font-size: 1.1rem; color: #333;">Ürün açıklaması buraya gelecek.</p>
        <div style="background: #f1f1f1; padding: 10px; border-radius: 5px;">
            <strong>Adres:</strong> Silahtarağa mah. Adil sok. No:4 Çorlu / Tekirdağ<br>
            <strong>İletişim:</strong> x_erdemsarigul@hotmail.com
        </div>
    </div>
</div>

<script>
    function bilgiAc(ad, detay) {
        document.getElementById('modalBaslik').innerText = ad;
        document.getElementById('modalDetay').innerText = detay;
        document.getElementById('urunModal').style.display = "block";
    }

    function bilgiKapat() {
        document.getElementById('urunModal').style.display = "none";
    }

    // Ekranın dışına tıklayınca kapanması için
    window.onclick = function(event) {
        var modal = document.getElementById('urunModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
