<!-- Sağ: Form -->
<div class="contact-form-box">
  <h3>Mesaj Gönderin</h3>
  <form id="contact-form" action="https://formspree.io/f/xojodqoj" method="POST">
    
    <div class="form-group">
      <label for="name">Ad Soyad *</label>
      <input type="text" id="name" name="name" placeholder="Adınız Soyadınız" required autocomplete="name" />
    </div>
    
    <div class="form-group">
      <label for="email">E-posta Adresi *</label>
      <input type="email" id="email" name="email" placeholder="ornek@email.com" required autocomplete="email" />
    </div>
    
    <div class="form-group">
      <label for="phone">Telefon Numarası</label>
      <input type="tel" id="phone" name="phone" placeholder="+90 5xx xxx xx xx" autocomplete="tel" />
    </div>
    
    <div class="form-group">
      <label for="company">Firma Adı</label>
      <input type="text" id="company" name="company" placeholder="Firma adınız (opsiyonel)" autocomplete="organization" />
    </div>
    
    <div class="form-group">
      <label for="subject">Konu *</label>
      <select id="subject" name="subject" required>
        <option value="">– Konu seçin –</option>
        <option value="toptan">Toptan Fiyat Talebi</option>
        <option value="urun">Ürün Hakkında Bilgi</option>
        <option value="siparis">Sipariş Sorgusu</option>
        <option value="garanti">Garanti / İade</option>
        <option value="genel">Genel Bilgi</option>
        <option value="diger">Diğer</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="message">Mesajınız *</label>
      <textarea id="message" name="message" placeholder="Mesajınızı buraya yazın…" required></textarea>
    </div>
    
    <input type="hidden" name="_subject" value="Sarıgül Ticaret - Yeni İletişim Formu Mesajı">
    <input type="hidden" name="_language" value="tr">

    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:1rem;">
      ✉ Mesajı Gönder
    </button>
    
    <div id="form-message" class="form-message" style="display:none; margin-top:1.5rem; padding:1rem; border-radius:var(--radius); text-align:center; font-weight:bold;"></div>
  </form>
  
  <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.06);">
    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;">Veya doğrudan ulaşın:</p>
    <div style="display:flex;gap:0.8rem;flex-wrap:wrap;">
      <a href="https://wa.me/{{ .Site.Params.phone }}?text=Merhaba%2C%20bilgi%20almak%20istiyorum."
         target="_blank" rel="noopener" class="btn btn-whatsapp" style="flex:1;justify-content:center;">
        💬 WhatsApp
      </a>
      <a href="mailto:{{ .Site.Params.email }}" class="btn btn-outline" style="flex:1;justify-content:center;">
        ✉ E-posta
      </a>
    </div>
  </div>
</div>

<!-- AJAX Form Gönderme Scripti -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var form = document.getElementById("contact-form");
    var formMessage = document.getElementById("form-message");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      
      var data = new FormData(event.target);
      
      try {
        var response = await fetch(event.target.action, {
          method: form.method,
          body: data,
          headers: {
            'Accept': 'application/json'
          }
        });
        
        if (response.ok) {
          formMessage.style.display = "block";
          formMessage.style.backgroundColor = "rgba(40, 167, 69, 0.1)";
          formMessage.style.color = "#28a745";
          formMessage.innerHTML = "✓ Mesajınız başarıyla gönderildi! En kısa sürede dönüş yapacağız.";
          form.reset();
        } else {
          formMessage.style.display = "block";
          formMessage.style.backgroundColor = "rgba(220, 53, 69, 0.1)";
          formMessage.style.color = "#dc3545";
          formMessage.innerHTML = "⚠ Gönderim sırasında bir hata oluştu. Lütfen daha sonra tekrar deneyin.";
        }
      } catch (error) {
        formMessage.style.display = "block";
        formMessage.style.backgroundColor = "rgba(220, 53, 69, 0.1)";
        formMessage.style.color = "#dc3545";
        formMessage.innerHTML = "⚠ Bağlantı hatası. Lütfen internet bağlantınızı kontrol edin.";
      }
    });
  });
</script>
